services:
  # === БАЗА ДАННЫХ ===
  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: example
      MYSQL_USER: app
      MYSQL_PASSWORD: very_strong
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # === PYTHON-ПРИЛОЖЕНИЕ ===
  app:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: python-app
    environment:
      DB_HOST: mysql
      DB_USER: app
      DB_PASSWORD: very_strong
      DB_NAME: example
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      backend:
        ipv4_address: 172.20.0.5

  # === REVERSE-PROXY (HAPROXY) ===
  reverse-proxy:
    image: haproxy:2.4
    user: root
    restart: always
    networks:
      - backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./haproxy/reverse/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:rw

  # === INGRESS-PROXY (NGINX) — host network ===
  ingress-proxy:
    image: nginx:latest
    restart: always
    network_mode: host
    volumes:
      - ./nginx/ingress/default.conf:/etc/nginx/conf.d/default.conf:rw
      - ./nginx/ingress/nginx.conf:/etc/nginx/nginx.conf:rw

volumes:
  mysql-data:

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24